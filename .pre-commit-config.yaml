# Pre-commit hooks configuration
# Install pre-commit: pip install pre-commit
# Install hooks: pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

repos:
  # ==========================================================================
  # General File Checks
  # ==========================================================================

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Identify files with syntax errors
      - id: check-ast
      - id: check-yaml
        args: ['--unsafe']
      - id: check-json
      - id: check-toml
      - id: check-xml

      # Ensure files end with newline
      - id: end-of-file-fixer

      # Trim trailing whitespace
      - id: trailing-whitespace
        args: [--markdown-template='']

      # Security checks
      - id: detect-private-key

      # File size checks
      - id: check-large-files
        args: ['--maxkb=1000']

      # Merge conflict checks
      - id: check-merge-conflict

      # Ensure executable files have proper shebang
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # ==========================================================================
  # Python Code Formatting
  # ==========================================================================

  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        language_version: python3.12
        args: ['--line-length=120', '--target-version=py312']

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=120', '--py=312']

  # ==========================================================================
  # Python Linting
  # ==========================================================================

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: ['--fix']
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ['-ll', '--skip=B101']
        exclude: ^tests/

  # ==========================================================================
  # Type Checking
  # ==========================================================================

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-python-dotenv
        args: [--ignore-missing-imports]
        exclude: ^(tests/|.*_pb2\.py$)

  # ==========================================================================
  # YAML / Markdown Linting
  # ==========================================================================

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: [--strict]
        exclude: ^\.github/

  - repo: https://github.com/markdownlint/markdownlint
    rev: v0.12.0
    hooks:
      - id: markdownlint
        args: [--fix]

  # ==========================================================================
  # Docstring Formatting
  # ==========================================================================

